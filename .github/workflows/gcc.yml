name: GCC aarch64 cross-compile

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  bip-client-bbmd-apps:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    # Target device (uname -a / cpuinfo):
    #   Linux 4.14.98 aarch64 GNU/Linux
    #   ARMv8-A, CPU implementer 0x41 (ARM), CPU part 0xd03 => Cortex-A53
    - name: Create Build Environment
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
    - name: Build Demo Apps BBMD=client (aarch64 cross-compile)
      run: |
        aarch64-linux-gnu-gcc --version
        make clean
        make LEGACY=true BBMD=client \
          CC="aarch64-linux-gnu-gcc -mcpu=cortex-a53" \
          AR=aarch64-linux-gnu-ar \
          all
    - name: Collect aarch64 binaries
      run: |
        mkdir -p artifacts
        # copy only the cross-compiled ELF executables, skip the shell scripts
        for f in bin/*; do
          if [ -f "$f" ] && file "$f" | grep -q "ELF 64-bit.*aarch64"; then
            cp "$f" artifacts/
          fi
        done
        echo "Collected binaries:"
        file artifacts/* || true
    - name: Upload aarch64 binaries
      uses: actions/upload-artifact@v4
      with:
        name: bacnet-bip-client-aarch64
        path: artifacts/
        if-no-files-found: error
