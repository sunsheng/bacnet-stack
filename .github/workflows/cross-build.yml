name: Cross-build and Release

# Builds the stack for 5 targets and, on a version tag, publishes the
# packaged binaries as GitHub Release assets.
#
#   - linux-arm32-glibc : Arm GNU-A 10.2 (glibc 2.31), dynamic  (cross, ubuntu)
#   - linux-arm32-musl  : musl, fully static                    (cross, ubuntu)
#   - linux-x86_64-musl : musl, fully static                    (cross, ubuntu)
#   - windows-x86       : native MSVC, Win32                    (windows-latest)
#   - windows-x64       : native MSVC, x64                      (windows-latest)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-arm32-glibc
            os: ubuntu-latest
            toolchain: cmake/toolchain-arm-linux-gnueabihf.cmake
            pkgext: tar.gz
            tc_url: https://developer.arm.com/-/media/files/downloads/gnu-a/10.2-2020.11/binrel/gcc-arm-10.2-2020.11-x86_64-arm-none-linux-gnueabihf.tar.xz
            tc_dir: gcc-arm-10.2-2020.11-x86_64-arm-none-linux-gnueabihf
            tc_var: ARM_TOOLCHAIN_ROOT
          - target: linux-arm32-musl
            os: ubuntu-latest
            toolchain: cmake/toolchain-arm-musl-static.cmake
            pkgext: tar.gz
            tc_url: https://github.com/sunsheng/bacnet-stack/releases/download/toolchains-musl/arm-linux-musleabihf-cross.tgz
            tc_dir: arm-linux-musleabihf-cross
            tc_var: ARM_MUSL_TOOLCHAIN_ROOT
          - target: linux-x86_64-musl
            os: ubuntu-latest
            toolchain: cmake/toolchain-x86_64-musl-static.cmake
            pkgext: tar.gz
            tc_url: https://github.com/sunsheng/bacnet-stack/releases/download/toolchains-musl/x86_64-linux-musl-cross.tgz
            tc_dir: x86_64-linux-musl-cross
            tc_var: X86_64_MUSL_TOOLCHAIN_ROOT
          - target: windows-x86
            os: windows-latest
            arch: Win32
            pkgext: zip
          - target: windows-x64
            os: windows-latest
            arch: x64
            pkgext: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install base tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build zip xz-utils

      - name: Cache downloaded toolchain
        if: matrix.tc_url != ''
        id: tc-cache
        uses: actions/cache@v4
        with:
          path: ~/toolchains/${{ matrix.tc_dir }}
          key: toolchain-${{ matrix.target }}-${{ matrix.tc_dir }}

      - name: Download toolchain
        if: matrix.tc_url != '' && steps.tc-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p "$HOME/toolchains" && cd "$HOME/toolchains"
          url="${{ matrix.tc_url }}"
          echo "Downloading $url"
          curl -fL --retry 5 --retry-all-errors --connect-timeout 30 --max-time 900 \
            -o tc.archive "$url"
          case "$url" in
            *.tar.xz) tar xf tc.archive ;;
            *)        tar xzf tc.archive ;;
          esac
          rm -f tc.archive

      - name: Set toolchain root
        if: matrix.tc_var != ''
        run: echo "EXTRA_CMAKE=-D${{ matrix.tc_var }}=$HOME/toolchains/${{ matrix.tc_dir }}" >> "$GITHUB_ENV"

      - name: Configure
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Native build with the runner's Visual Studio toolset; -A picks the
            # target architecture. Static CRT so the .exe needs no VC redist.
            cmake -B build -A "${{ matrix.arch }}" \
              -DCMAKE_POLICY_DEFAULT_CMP0091=NEW \
              -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
          else
            cmake -B build -G Ninja \
              -DCMAKE_TOOLCHAIN_FILE="${{ matrix.toolchain }}" \
              -DCMAKE_BUILD_TYPE=Release \
              $EXTRA_CMAKE
          fi

      - name: Build
        shell: bash
        run: cmake --build build --config Release -j

      - name: Package
        id: package
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME//\//-}"
          pkg="bacnet-stack-${ver}-${{ matrix.target }}"
          mkdir -p "dist/$pkg"
          # Multi-config generators (MSVC) emit into build/Release/; single-config
          # (Ninja) emits straight into build/.
          bindir=build
          [ -d build/Release ] && bindir=build/Release
          # collect executables and the static library
          find "$bindir" -maxdepth 1 -type f \( -perm -u+x -o -name '*.exe' \) ! -name '*.cmake' \
            -exec cp {} "dist/$pkg/" \;
          cp "$bindir"/libbacnet-stack.a "dist/$pkg/" 2>/dev/null || true
          cp "$bindir"/bacnet-stack.lib "dist/$pkg/" 2>/dev/null || true
          ( cd dist
            if [ "${{ matrix.pkgext }}" = "zip" ]; then
              if command -v zip >/dev/null 2>&1; then
                zip -r "$pkg.zip" "$pkg"
              else
                # windows runners ship 7-Zip but not Info-ZIP
                7z a "$pkg.zip" "$pkg" >/dev/null
              fi
            else
              tar czf "$pkg.tar.gz" "$pkg"
            fi )
          ls -lh "dist/$pkg.${{ matrix.pkgext }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*.${{ matrix.pkgext }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
          || gh release upload "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" --clobber
