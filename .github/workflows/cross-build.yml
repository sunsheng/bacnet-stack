name: Cross-build and Release

# Builds the stack for 5 targets and, on a version tag, publishes the
# packaged binaries as GitHub Release assets.
#
#   - linux-arm32-glibc : Arm GNU-A 10.2 (glibc 2.31), dynamic
#   - linux-arm32-musl  : musl, fully static
#   - linux-x86_64-musl : musl, fully static
#   - windows-x86       : MinGW-w64 i686, static
#   - windows-x64       : MinGW-w64 x86_64, static

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-arm32-glibc
            toolchain: cmake/toolchain-arm-linux-gnueabihf.cmake
            pkgext: tar.gz
            tc_url: https://developer.arm.com/-/media/files/downloads/gnu-a/10.2-2020.11/binrel/gcc-arm-10.2-2020.11-x86_64-arm-none-linux-gnueabihf.tar.xz
            tc_dir: gcc-arm-10.2-2020.11-x86_64-arm-none-linux-gnueabihf
            tc_var: ARM_TOOLCHAIN_ROOT
          - target: linux-arm32-musl
            toolchain: cmake/toolchain-arm-musl-static.cmake
            pkgext: tar.gz
            tc_url: https://github.com/sunsheng/bacnet-stack/releases/download/toolchains-musl/arm-linux-musleabihf-cross.tgz
            tc_dir: arm-linux-musleabihf-cross
            tc_var: ARM_MUSL_TOOLCHAIN_ROOT
          - target: linux-x86_64-musl
            toolchain: cmake/toolchain-x86_64-musl-static.cmake
            pkgext: tar.gz
            tc_url: https://github.com/sunsheng/bacnet-stack/releases/download/toolchains-musl/x86_64-linux-musl-cross.tgz
            tc_dir: x86_64-linux-musl-cross
            tc_var: X86_64_MUSL_TOOLCHAIN_ROOT
          - target: windows-x86
            toolchain: cmake/toolchain-mingw-i686.cmake
            pkgext: zip
            apt: gcc-mingw-w64-i686
          - target: windows-x64
            toolchain: cmake/toolchain-mingw-x86_64.cmake
            pkgext: zip
            apt: gcc-mingw-w64-x86-64
    steps:
      - uses: actions/checkout@v4

      - name: Install base tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build zip xz-utils

      - name: Install apt toolchain
        if: matrix.apt != ''
        run: sudo apt-get install -y ${{ matrix.apt }}

      - name: Cache downloaded toolchain
        if: matrix.tc_url != ''
        id: tc-cache
        uses: actions/cache@v4
        with:
          path: ~/toolchains/${{ matrix.tc_dir }}
          key: toolchain-${{ matrix.target }}-${{ matrix.tc_dir }}

      - name: Download toolchain
        if: matrix.tc_url != '' && steps.tc-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p "$HOME/toolchains" && cd "$HOME/toolchains"
          url="${{ matrix.tc_url }}"
          echo "Downloading $url"
          curl -fL --retry 5 --retry-all-errors --connect-timeout 30 --max-time 900 \
            -o tc.archive "$url"
          case "$url" in
            *.tar.xz) tar xf tc.archive ;;
            *)        tar xzf tc.archive ;;
          esac
          rm -f tc.archive

      - name: Set toolchain root
        if: matrix.tc_var != ''
        run: echo "EXTRA_CMAKE=-D${{ matrix.tc_var }}=$HOME/toolchains/${{ matrix.tc_dir }}" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${{ matrix.toolchain }}" \
            -DCMAKE_BUILD_TYPE=Release \
            $EXTRA_CMAKE

      - name: Build
        run: cmake --build build -j

      - name: Package
        run: |
          ver="${GITHUB_REF_NAME//\//-}"
          pkg="bacnet-stack-${ver}-${{ matrix.target }}"
          mkdir -p "dist/$pkg"
          find build -maxdepth 1 -type f \( -perm -u+x -o -name '*.exe' \) ! -name '*.cmake' \
            -exec cp {} "dist/$pkg/" \;
          cp build/libbacnet-stack.a "dist/$pkg/" 2>/dev/null || true
          ( cd dist
            if [ "${{ matrix.pkgext }}" = "zip" ]; then
              zip -r "$pkg.zip" "$pkg"
            else
              tar czf "$pkg.tar.gz" "$pkg"
            fi )
          ls -lh "dist/$pkg.${{ matrix.pkgext }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*.${{ matrix.pkgext }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
          || gh release upload "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" --clobber
